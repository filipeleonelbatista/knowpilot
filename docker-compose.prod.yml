# Production overlay for Ubuntu VPS:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  ollama:
    restart: unless-stopped
    ports: [] # Ollama only on internal Docker network

  app:
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-3003}:3000" # host 3003 → container 3000 (Caddy/Nginx)
